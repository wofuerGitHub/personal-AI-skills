openapi: 3.1.0
info:
  title: Personal AI Skills Raw GitHub Files
  version: 0.2.0
  description: Fetches source-of-truth skill files from the public personal-AI-skills GitHub repository.

servers:
  - url: https://raw.githubusercontent.com/wofuerGitHub/personal-AI-skills/main
    description: Raw GitHub content from the main branch

paths:
  /gpts/senior-financial-analyst/repo-map.md:
    get:
      operationId: getSeniorFinancialAnalystRepoMap
      summary: Get the Senior Financial Analyst repository map
      description: Fetches the repo map that defines which GPT, skill, and config files this GPT should use.
      responses:
        "200":
          description: Markdown file content
          content:
            text/plain:
              schema:
                type: string

  /gpts/senior-financial-analyst/config.md:
    get:
      operationId: getSeniorFinancialAnalystConfig
      summary: Get the Senior Financial Analyst GPT config
      description: Fetches the GPT package config defining scope, versioning, capabilities, users, active skills, and boundaries.
      responses:
        "200":
          description: Markdown file content
          content:
            text/plain:
              schema:
                type: string

  /gpts/senior-financial-analyst/instructions.md:
