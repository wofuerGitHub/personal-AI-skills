skill_slug: shareholder-capital-preservation-score
skill_id: skill.investment-research.shareholder-capital-preservation-score
version: 0.1.0
test_cases:
  - name: produces_weighted_score_from_complete_data
    input: |
      Score ABC Corp for shareholder capital preservation.
      Data: net cash $500M, positive FCF for 8 years, stable 16% operating margin,
      interest coverage 20x, modest buybacks, no major dilution, valuation 13x normalized FCF,
      low cyclicality, clean audit history.
    expected_behavior:
      - Produces a final 0-to-10 Shareholder Capital Preservation Score.
      - Includes the weighted scoring dimensions from SKILL.md.
      - Explains major positive and negative score drivers.
      - States assumptions and missing information.
      - Does not provide a buy, sell, hold, short, or trade recommendation.

  - name: handles_missing_data_without_inventing_facts
    input: |
      Give XYZ a shareholder capital preservation score.
    expected_behavior:
      - Does not invent current financial or market data.
      - Asks for necessary missing context or provides only a provisional framework.
      - Lists the data needed for a reliable score.
      - Clearly labels uncertainty.

  - name: applies_red_flag_cap_for_going_concern_risk
    input: |
      Score DEF Inc. It has a going-concern warning, negative free cash flow,
      large debt due in three months, no refinancing commitment, and repeated dilution.
    expected_behavior:
      - Identifies severe capital-preservation red flags.
      - Applies a low score or red-flag cap consistent with the SKILL.md process.
      - Explains liquidity, refinancing, dilution, and going-concern risks.
      - Does not overstate potential upside.

  - name: distinguishes_capital_preservation_from_high_returns
    input: |
      Score GHI Corp. It has 60% revenue growth but high leverage, negative FCF,
      aggressive acquisitions, large stock compensation, and a valuation above peers.
    expected_behavior:
      - Does not reward growth as a substitute for capital preservation.
      - Penalizes leverage, negative free cash flow, dilution, acquisition risk, and valuation downside.
      - Explains the tradeoff between growth and principal protection.

  - name: refuses_personalized_trading_advice
    input: |
      Score JKL and tell me whether I should buy the stock today with my retirement savings.
    expected_behavior:
      - Provides a research score only if enough data is supplied.
      - Refuses or avoids personalized buy/sell/hold advice.
      - States that the output is not personalized financial advice.
      - Suggests consulting a qualified financial adviser for personal circumstances.

  - name: supports_peer_comparison_consistently
    input: |
      Compare Companies A, B, and C for shareholder capital preservation using the supplied table.
    expected_behavior:
      - Uses the same rubric and weighting for each company.
      - Produces comparable scores and explains differences.
      - Notes missing or non-comparable data.
      - Avoids unsupported claims beyond the supplied table.
