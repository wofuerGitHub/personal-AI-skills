---
skill: shareholder-capital-preservation-score
tests:
  - name: complete_user_summary_strong_company
    prompt: >
      Score a company with net cash, recurring free cash flow, ROIC above 20%,
      declining share count, no major M&A, and aligned insider ownership.
    expected:
      includes:
        - "Score:"
        - "/10"
        - "Confidence:"
        - "Score Breakdown"
        - "Balance-sheet resilience"
        - "Cash generation and earnings quality"
        - "Capital allocation discipline"
        - "Dilution and shareholder treatment"
      score_range:
        min: 7.0
        max: 10.0
      avoids:
        - "buy"
        - "sell"
        - "guaranteed"

  - name: weak_company_with_caps
    prompt: >
      Score a company with five years of negative free cash flow, 5x net debt
      to EBITDA, repeated equity issuance, and a doubled share count.
    expected:
      includes:
        - "Score:"
        - "/10"
        - "Main Risks"
        - "persistent"
        - "dilution"
        - "leverage"
      score_range:
        min: 0.0
        max: 4.0
      avoids:
        - "buy"
        - "sell"
        - "personalized investment advice"

  - name: missing_data_confidence
    prompt: >
      Score UnknownCo's shareholder capital preservation.
    expected:
      includes:
        - "Assumptions"
        - "Limitations"
        - "Confidence: Low"
      avoids:
        - "invented"
        - "guaranteed"
        - "definitely"

  - name: governance_red_flag
    prompt: >
      Score a company where related-party transactions are material and opaque,
      free cash flow is positive, and leverage is moderate.
    expected:
      includes:
        - "Governance"
        - "related-party"
        - "red flag"
      score_range:
        min: 0.0
        max: 6.5

  - name: sector_adjustment_reit
    prompt: >
      Score a REIT's shareholder capital preservation using a sector-specific approach.
    expected:
      includes:
        - "REIT"
        - "funds from operations"
        - "debt maturity"
        - "payout"
        - "tenant"
